<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微信读书同步插件</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index.198dd715.js"></script>
  <link rel="stylesheet" href="./assets/index.f07c4780.css">
</head>
<body>
  <main class="main">
    <section class="brand-bar">
      <div class="brand-item">
        <span class="brand-icon"><i class="fas fa-book-open"></i></span>
        <span class="brand-name">微信读书</span>
      </div>
      <span class="brand-arrow"><i class="fas fa-arrow-right"></i></span>
      <div class="brand-item">
        <span class="brand-icon brand-icon-blue"><i class="fas fa-cubes"></i></span>
        <span class="brand-name">飞书多维表格</span>
      </div>
    </section>

    <section class="feature-card">
      <div class="card-header">
        <div class="card-title-section">
          <div class="eyebrow"><i class="fas fa-rotate"></i><span>BITABLE 插件</span></div>
          <h1 class="card-title">同步进度</h1>
          <p class="card-description">将你的微信读书划线与笔记同步到多维表格。</p>
        </div>
      </div>

      <div class="card-content">
        <div class="form-item">
          <label for="wereadCookie">微信读书 Cookie</label>
          <div class="field-shell">
            <i class="fas fa-key"></i>
            <textarea id="wereadCookie" class="config-input" rows="3" placeholder="请粘贴 Cookie"></textarea>
          </div>
        </div>

        <div class="split-fields">
          <div class="form-item">
            <label for="maxRecords">同步数量</label>
            <div class="field-shell">
              <i class="fas fa-list-ol"></i>
              <input id="maxRecords" class="config-input" type="number" min="1" max="2000" placeholder="100" />
            </div>
          </div>
          <div class="form-item">
            <label for="tableName">目标数据表</label>
            <div class="field-shell">
              <i class="fas fa-table"></i>
              <input id="tableName" class="config-input" placeholder="微信读书笔记" />
            </div>
          </div>
        </div>

        <button id="startSync" class="main-action-btn">
          <div class="btn-content">
            <i class="fas fa-rotate btn-icon"></i>
            <span id="syncBtnText" class="btn-text">确认并同步</span>
            <div id="syncLoadingSpinner" class="loading-spinner" style="display: none;">
              <i class="fas fa-spinner fa-spin"></i>
            </div>
          </div>
        </button>

        <div id="syncProgressContainer" class="progress-section" style="display: none;">
          <div class="progress-header">
            <span class="progress-label">正在同步到飞书</span>
            <span id="syncProgressValue" class="progress-percentage">0%</span>
          </div>
          <div class="progress-bar-container">
            <div id="syncProgressBar" class="progress-bar-fill" style="width: 0%"></div>
          </div>
          <div id="syncProgressText" class="progress-text">准备开始同步...</div>
          <div class="sync-meta">
            <span><i class="fas fa-lock"></i> 已加密</span>
            <span><i class="fas fa-clock-rotate-left"></i> 刚刚同步</span>
          </div>
        </div>

        <div id="resultContainer" class="result-section" style="display: none;">
          <div id="resultMessage" class="result-message"></div>
        </div>
      </div>
    </section>

    <section class="hint-card">
      <i class="fas fa-circle-info"></i>
      <p>请确保表字段与微信读书笔记属性一致，避免映射失败。</p>
    </section>

    <footer class="footer-info">© 2024 微信读书同步工具</footer>
  </main>

  <!-- Alipay QR Code Modal -->
  <div id="alipayQRModal" class="qr-modal-overlay" style="display: none;">
    <div class="qr-modal">
      <button id="alipayQRClose" class="qr-modal-close">&times;</button>
      <div class="qr-modal-header">
        <i class="fas fa-qrcode"></i>
        <h3>支付宝扫码支付</h3>
      </div>
      <div class="qr-modal-body">
        <img id="alipayQRImage" class="qr-code-image" alt="支付宝付款码" />
        <p class="qr-modal-hint">请使用支付宝扫描二维码完成支付</p>
        <div class="qr-modal-status">
          <i class="fas fa-spinner fa-spin"></i>
          <span>等待支付中...</span>
        </div>
      </div>
    </div>
  </div>

  
</body>
</html>
